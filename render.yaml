services:
  - type: web
    name: ai-resume-builder
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer
